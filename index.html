<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraCare Pro | BLE Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; color: white; margin-top: 10px; }
        .btn-blue { background: #3b82f6; } .btn-green { background: var(--success); } .btn-outline { background: transparent; border: 2px solid #334155; color: var(--danger); }
        input[type="time"] { background: #334155; border: none; color: white; padding: 12px; border-radius: 8px; font-size: 18px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .schedule-row { background: #334155; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .alert-box { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; }
        #dashboard-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🫁 AstraCare Pro</h1>
    <div class="card" id="conn-card">
        <button id="connectBtn" class="btn btn-blue">Connect Bluetooth</button>
    </div>

    <div id="dashboard-ui">
        <div class="card">
            <div class="stat-label">Device Inventory</div>
            <div id="inv-val" class="stat-val" style="font-size: 42px; margin: 10px 0;">--- / 200</div>
            
            <div id="alert-section" class="alert-box" style="display:none;">
                <span style="color:var(--danger); font-weight:bold;">⚠️ Unplanned Puffs: </span>
                <span id="extra-val" style="color:white; font-size:20px;">0</span>
            </div>
        </div>

        <div class="card">
            <h3>Saved Timings</h3>
            <div id="schedule-list"></div>
        </div>

        <div class="card">
            <h3>Add Dose Timer</h3>
            <input type="time" id="timeInput" value="08:00">
            <button id="saveTimerBtn" class="btn btn-green">Sync to Inhaler</button>
            <button id="resetBtn" class="btn btn-outline" style="margin-top: 20px;">⚠️ Master Reset</button>
        </div>

        <div class="card">
            <h3>30-Day Adherence (mcg)</h3>
            <canvas id="monthChart"></canvas>
        </div>
    </div>
</div>

<script>
    let commandChar, chart;
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const COMMAND_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const DATA_UUID    = "8221162b-658b-4977-94d7-0101b4c9e46a";

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'AstraCare' }], optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            commandChar = await service.getCharacteristic(COMMAND_UUID);
            const dataChar = await service.getCharacteristic(DATA_UUID);

            document.getElementById('conn-card').style.display = "none";
            document.getElementById('dashboard-ui').style.display = "block";

            await dataChar.startNotifications();
            dataChar.addEventListener('characteristicvaluechanged', (event) => {
                const decoder = new TextDecoder('utf-8');
                const data = JSON.parse(decoder.decode(event.target.value));
                updateDashboard(data);
            });
        } catch (e) { console.error(e); }
    });

    function updateDashboard(data) {
        // Inventory
        document.getElementById('inv-val').innerText = `${200 - data.u} / 200`;
        
        // Show Unplanned Puffs if greater than 0
        if(data.e > 0) {
            document.getElementById('alert-section').style.display = "block";
            document.getElementById('extra-val').innerText = data.e;
        } else {
            document.getElementById('alert-section').style.display = "none";
        }

        // Schedule
        const list = document.getElementById('schedule-list');
        list.innerHTML = "";
        data.s.forEach((min, index) => {
            let h = Math.floor(min / 60);
            let m = min % 60;
            let timeStr = (h<10?'0':'') + h + ":" + (m<10?'0':'') + m;
            list.innerHTML += `<div class="schedule-row"><span>${timeStr}</span><span onclick="delDose(${index})" style="color:var(--danger); cursor:pointer; font-weight:bold;">Remove</span></div>`;
        });
        if(data.s.length === 0) list.innerHTML = "<p style='color:var(--text-dim)'>No timers active.</p>";

        updateChart(data.h);
    }

    async function delDose(index) {
        if(confirm("Remove this dose time?")) {
            await commandChar.writeValue(new TextEncoder().encode("DEL:" + index));
        }
    }

    function updateChart(historyArray) {
        const ctx = document.getElementById('monthChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({ length: 30 }, (_, i) => 30 - i),
                datasets: [{ label: 'mcg', data: historyArray.reverse(), borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)', fill: true, tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid:{color:'#334155'} } } }
        });
    }

    document.getElementById('saveTimerBtn').addEventListener('click', async () => {
        const [h, m] = document.getElementById('timeInput').value.split(':').map(Number);
        await commandChar.writeValue(new TextEncoder().encode((h * 60 + m).toString()));
        alert("Schedule Updated!");
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
        if(confirm("Reset all medical history and inventory?")) await commandChar.writeValue(new TextEncoder().encode("9999"));
    });
</script>
</body>
</html>
